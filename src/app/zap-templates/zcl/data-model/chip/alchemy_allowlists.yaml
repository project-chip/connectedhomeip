# Allowlists for check_alchemy_metadata.py
#
# MANUAL_ALLOWLIST
#   XML files that pre-date Alchemy adoption and are intentionally maintained
#   by hand. They are not expected to carry the Alchemy metadata marker.
#   Do NOT add new entries here — all new data-model XML files must be
#   generated using Alchemy (https://github.com/project-chip/alchemy).
#
# INCOMPLETE_METADATA_ALLOWLIST
#   Alchemy-generated files that pre-date the full metadata header. Older
#   Alchemy versions omitted the "Alchemy: v..." line or left "Git:" empty.
#   These files must be regenerated with a current Alchemy release and then
#   removed from this list. Do NOT add new entries here.

