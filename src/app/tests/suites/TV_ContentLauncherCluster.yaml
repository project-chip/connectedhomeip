name: Content Launcher Cluster Tests

config:
    nodeId: 0x12344321
    cluster: "Content Launcher"
    endpoint: 1

tests:
    - label: "Wait for the commissioned device to be retrieved"
      cluster: "DelayCommands"
      command: "WaitForCommissionee"
      arguments:
          values:
              - name: "nodeId"
                value: nodeId

    - label: "Read attribute accept header list"
      command: "readAttribute"
      attribute: "AcceptHeader"
      response:
          value: ["example", "example"]

    - label: "Read attribute supported streaming protocols"
      command: "readAttribute"
      attribute: "SupportedStreamingProtocols"
      response:
          value: 0

    - label: "Launch Content Command"
      command: "LaunchContent"
      arguments:
          values:
              - name: "AutoPlay"
                value: true
              - name: "Data"
                value: "exampleData"
              - name: "Search"
                value:
                    {
                        ParameterList:
                            [
                                {
                                    Type: 1,
                                    Value: "exampleValue",
                                    ExternalIDList:
                                        [{ Name: "name", Value: "value" }],
                                },
                            ],
                    }
              - name: "PlaybackPreferences"
                value:
                    {
                        PlaybackPosition: 0,
                        TextTrack:
                            {
                                LanguageCode: "exampleLanguageCode",
                                Characteristics: [0],
                                AudioOutputIndex: 0,
                            },
                        AudioTracks:
                            [
                                {
                                    LanguageCode: "exampleLanguageCode",
                                    Characteristics: [0],
                                    AudioOutputIndex: 0,
                                },
                            ],
                    }
              - name: "UseCurrentContext"
                value: true
      response:
          values:
              - name: "Data"
                value: "exampleData"
              - name: "Status"
                value: 0

    # TODO: Re-enable once chip-tool/darwinframeworktool positional arg parsing
    # is fixed for commands with multiple optional struct/array parameters.
    # The test runner misinterprets the node-id as a ContentHeaders value.
    # - label: "Launch URL Command"
    #   command: "LaunchURL"

# See https://github.com/project-chip/connectedhomeip/blob/master/docs/testing/yaml.md#defining-the-ci-test-arguments
# for details about the block below.
CI:
    - name: tv
      app: tv
