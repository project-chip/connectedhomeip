    - label:
          "Step 6: If Groupcast cluster is NOT enabled on the RootNode endpoint,
          or its Sender feature is disabled, skip remaining steps. Otherwise,
          DUT sends the Groupcast JoinGroup command on the TH on EP0 with
          GroupID=1, Endpoints=[any endpoint from PartsList], KeySetID=1."
      verification: |
          ./chip-tool groupsettings add-group grp1 1 --addressPolicy 0
          ./chip-tool groupsettings add-keysets 1 0 0 hex:d0d1d2d3d4d5d6d7d8d9dadbdcdddedf
          ./chip-tool groupsettings bind-keyset 1 1

          Before joining the group, configure the above commands. The client (chip-tool) must be properly configured with a group and corresponding keyset that matches the configuration on the end device.

          ./chip-tool groupcast join-group 1 '[1]' 1 1 0

          Verify the TH receives the Groupcast JoinGroup command as specified in the step label.

