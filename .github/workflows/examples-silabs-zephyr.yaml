name: Build example - Silabs Zephyr

on:
  push:
    branches:
      - master
      - "v*-branch"
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}-${{ (github.event_name == 'pull_request' && github.event.number) || (github.event_name == 'workflow_dispatch' && github.run_number) || github.sha }}
  cancel-in-progress: true

env:
  CHIP_LOG_TIMESTAMPS: false

jobs:
  silabs:
    name: Silabs Zephyr

    runs-on: ubuntu-latest
    if: github.actor != 'restyled-io[bot]'

    container:
      image: ghcr.io/malbert-silabs/chip-build-silabs-zephyr:194
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Checkout submodules & Bootstrap
        uses: ./.github/actions/checkout-submodules-and-bootstrap
        with:
          platform: silabs_docker

      - name: Build SiWx917 Lighting App
        run: |
          # TODO: Remove the Zephyr patch once 4.4.1 is available in the Silabs SDK.
          # Workaround for a C++ build regression introduced in Zephyr 4.4.0:
          # https://github.com/zephyrproject-rtos/zephyr/pull/106969
          cd /opt/silabs/zephyr \
          && curl -L https://github.com/zephyrproject-rtos/zephyr/commit/b4c86826ca75d99f78eb8f0e5718653bf85db35d.patch | git apply \
          && cd ../zephyr-silabs \
          && west build -b siwx917_rb4338a -p always "${GITHUB_WORKSPACE}/examples/lighting-app/silabs/zephyr"

      - name: Clean out build output
        run: rm -rf ./out

      - name: Notify Slack on Failure
        if: failure()
        uses: ./.github/actions/notify-slack-failure
        with:
          slack-webhook: ${{ secrets.SWTT_SLACK_WEBHOOK }}
