# Validates that every file in .github/workflows/ parses as a valid GitHub
# Actions workflow. Kept intentionally tiny and isolated from lint.yml so a
# parse error in any other workflow (including lint.yml itself) cannot hide
# this check. Mark "Workflow Lint / actionlint" as a required status check
# in branch protection so a broken workflow blocks merges instead of
# silently disappearing from the PR's check list.

name: Workflow Lint

on:
    push:
        branches:
            - master
            - 'v*-branch'
    pull_request:
    merge_group:
    workflow_dispatch:

concurrency:
    group: ${{ github.ref }}-${{ github.workflow }}-${{ (github.event_name == 'pull_request' && github.event.number) || github.sha }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    actionlint:
        name: actionlint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Run actionlint
              uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
              with:
                  fail-on-error: true
