name: REPL Tests Only

on:
  push:
    branches:
      - master
      - 'v*-branch'
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}-${{ (github.event_name ==
      'pull_request' && github.event.number) || (github.event_name ==
      'workflow_dispatch' && github.run_number) || github.sha }}
  cancel-in-progress: true

env:
  CHIP_NO_LOG_TIMESTAMPS: true

jobs:
  repl_tests_linux:
    name: REPL Tests - Linux

    if: github.actor != 'restyled-io[bot]'

    strategy:
      matrix:
        build_variant: [ipv6only-no-ble-no-wifi]

    env:
      TSAN_OPTIONS: "halt_on_error=1 suppressions=scripts/tests/chiptest/tsan-linux-suppressions.txt"
      BUILD_VARIANT: ${{ matrix.build_variant }}

    runs-on: ubuntu-latest

    container:
      image: ghcr.io/project-chip/chip-build:132
      options:
        --privileged
        --sysctl net.ipv6.conf.all.disable_ipv6=0
        --sysctl net.ipv4.conf.all.forwarding=0
        --sysctl net.ipv6.conf.all.forwarding=0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout submodules & Bootstrap
        uses: ./.github/actions/checkout-submodules-and-bootstrap
        with:
          platform: linux
          bootstrap-log-name: bootstrap-logs-linux-${{ matrix.build_variant }}${{ matrix.chip_tool }}

      - name: Prepare core dump and objdir
        run: |
          mkdir /tmp/cores || true
          sysctl -w kernel.core_pattern=/tmp/cores/core.%u.%p.%t || true
          mkdir objdir-clone || true

      - name: Set up IPV6 environment
        uses: ./.github/actions/add-ipv6

      - name: Build Python REPL and example apps
        run: |
          scripts/run_in_build_env.sh './scripts/build_python.sh --install_virtual_env out/venv'
          ./scripts/run_in_build_env.sh \
            "./scripts/build/build_examples.py \
              --target linux-x64-all-clusters-${BUILD_VARIANT}-tsan-clang-test \
              --target linux-x64-python-bindings \
              build \
              --copy-artifacts-to objdir-clone \
            "

      - name: Generate test environment
        run: |
          echo "ALL_CLUSTERS_APP: out/linux-x64-all-clusters-${BUILD_VARIANT}-tsan-clang-test/chip-all-clusters-app" > /tmp/test_env.yaml

      - name: Run REPL tests
        run: |
          scripts/run_in_python_env.sh out/venv 'src/python_testing/execute_python_tests.py --env-file /tmp/test_env.yaml --search-directory src/python_testing'

      - name: Upload core files
        uses: actions/upload-artifact@v4
        if: ${{ failure() && !env.ACT }}
        with:
          name: crash-core-linux-python-repl
          path: /tmp/cores/
          retention-days: 5

      - name: Upload objdir
        uses: actions/upload-artifact@v4
        if: ${{ failure() && !env.ACT }}
        with:
          name: crash-objdir-linux-python-repl
          path: objdir-clone/
          retention-days: 5
