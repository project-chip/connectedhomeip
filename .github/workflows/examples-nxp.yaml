name: Build example - NXP

on:
    push:
        branches:
            - master
            - "v*-branch"
    pull_request:
    merge_group:

concurrency:
    group:
        ${{ github.ref }}-${{ github.workflow }}-${{ (github.event_name ==
        'pull_request' && github.event.number) || (github.event_name ==
        'workflow_dispatch' && github.run_number) || github.sha }}
    cancel-in-progress: true

env:
    CHIP_NO_LOG_TIMESTAMPS: true

jobs:
    FreeRTOS:
        name: FREERTOS

        env:
            BUILD_TYPE: gn_FreeRTOS

        runs-on: ubuntu-latest
        if: github.actor != 'restyled-io[bot]'

        container:
            image: ghcr.io/project-chip/chip-build-nxp:175
            volumes:
                - "/tmp/bloat_reports:/tmp/bloat_reports"
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Checkout submodules & Bootstrap
              uses: ./.github/actions/checkout-submodules-and-bootstrap
              with:
                  platform: nxp
                  extra-submodule-parameters: --recursive

            - name: Detect changed paths
              uses: dorny/paths-filter@v3
              id: changed_paths
              with:
                  filters: |
                      nxp:
                        - '**/nxp/**'

            - name: Set up environment for size reports
              uses: ./.github/actions/setup-size-reports
              if: ${{ !env.ACT }}
              with:
                  gh-context: ${{ toJson(github) }}

            - name: Build MCXW71 examples
              run: |
                  scripts/run_in_build_env.sh "\
                      ./scripts/build/build_examples.py \
                      --target nxp-mcxw71-freertos-contact-sensor-thread-mtd-low-power-frdm \
                      build \
                  "
            - name: Get MCXW71 contact sensor size stats
              run: |
                  .environment/pigweed-venv/bin/python3 scripts/tools/memory/gh_sizes.py \
                    nxp mcxw71+release contact \
                    out/nxp-mcxw71-freertos-contact-sensor-thread-mtd-low-power-frdm/app.elf \
                    /tmp/bloat_reports/

            - name: Build MCXW72 examples
              run: |
                  scripts/run_in_build_env.sh "\
                      ./scripts/build/build_examples.py \
                      --target nxp-mcxw72-freertos-contact-sensor-thread-mtd-low-power-frdm \
                      build \
                  "

            - name: clean build
              run: rm -rf ./out

            - name: Build RT1060 thermostat example app
              if:
                  github.event_name == 'push' || steps.changed_paths.outputs.nxp
                  == 'true' || steps.changed_paths.outputs.pigweed == 'true'
              run: |
                  scripts/run_in_build_env.sh "\
                      ./scripts/build/build_examples.py \
                      --target nxp-rt1060-freertos-thermostat-thread-wifi-ota-evkc-iwx12 \
                      build \
                  "

            - name: clean build
              run: rm -rf ./out

            - name: Build RT1170 thermostat example app
              if:
                  github.event_name == 'push' || steps.changed_paths.outputs.nxp
                  == 'true' || steps.changed_paths.outputs.pigweed == 'true'
              run: |
                  scripts/run_in_build_env.sh "\
                      ./scripts/build/build_examples.py \
                      --target nxp-rt1170-freertos-thermostat-thread-wifi-ota-iwx12 \
                      build \
                  "

            - name: clean build
              run: rm -rf ./out

            - name: Build RW61X thermostat OTBR example app
              run: |
                  scripts/run_in_build_env.sh "\
                      ./scripts/build/build_examples.py \
                      --target nxp-rw61x-freertos-thermostat-thread-wifi-ota-factory \
                      --target nxp-rw61x-freertos-thermostat-wifi-se05x \
                      build \
                  "
            - name: Build RW61X thermostat ethernet example app
              run: |
                  scripts/run_in_build_env.sh "\
                      ./scripts/build/build_examples.py \
                      --target nxp-rw61x-freertos-thermostat-ethernet-frdm \
                      build \
                  "

            - name: clean build
              run: rm -rf ./out

            - name: Uploading Size Reports
              uses: ./.github/actions/upload-size-reports
              if: ${{ !env.ACT }}
              with:
                  platform-name: NXP-FREERTOS
    zephyr:
        name: ZEPHYR

        runs-on: ubuntu-latest
        if: github.actor != 'restyled-io[bot]'

        container:
            image: ghcr.io/project-chip/chip-build-nxp-zephyr:175

        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Checkout submodules & Bootstrap
              uses: ./.github/actions/checkout-submodules-and-bootstrap
              with:
                  platform: nxp
            - name: Detect changed paths
              uses: dorny/paths-filter@v3
              id: changed_paths
              with:
                  filters: |
                      nxp:
                        - '**/nxp/**'
                      pigweed:
                        - 'src/pw_backends/**'
                        - 'third_party/pigweed/**'
            - name: Build NXP Zephyr examples
              if:
                  github.event_name == 'push' || steps.changed_paths.outputs.nxp
                  == 'true' || steps.changed_paths.outputs.pigweed == 'true'
              run: |
                  scripts/run_in_build_env.sh "\
                      ./scripts/build/build_examples.py \
                      --target nxp-rw61x-zephyr-all-clusters \
                      --target nxp-rw61x-zephyr-thermostat \
                      --target nxp-rw61x-zephyr-laundry-washer-factory \
                      build \
                  "
