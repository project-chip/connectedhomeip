name: Run misspell

on:
    push:
        branches:
            - master
            - 'v*-branch'
        paths:
            - "**.md"
            - ".github/.wordlist.txt"
    pull_request:
        paths:
            - "**.md"
            - ".github/.wordlist.txt"

jobs:
    check-spellcheck:
        name: Check Spelling - pyspelling
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - uses: rojopolis/spellcheck-github-actions@390a08ee9c46943112f21d2ff671649a2bacd33f # 0.62.0
            - name: Notify Slack on Failure
              if: failure()
              uses: ./.github/actions/notify-slack-failure
              with:
                slack-webhook: ${{ secrets.SWTT_SLACK_WEBHOOK }}
