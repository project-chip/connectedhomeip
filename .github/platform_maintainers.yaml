# Platform groups defining maintainers and their corresponding paths.
# Git-style wildmatch globs are supported (via python pathspec).
#
# Platforms must OPT-IN to this system. Active platforms are listed
# uncommented below. Proposals/examples for other platforms are commented out.

nxp:
  maintainers:
    - doru91
    - dinabenamar
    - chapongatien
    # Proposed maintainers (uncomment to activate):
    # - Martin-NXP
    # - marian-chereji-nxp
    # - sujaygkulkarni-nxp
  paths:
    - "src/platform/nxp/**"
    - "examples/platform/nxp/**"
    - "examples/**/nxp/**"
    - "third_party/nxp/**"
    - "src/test_driver/nxp/**"
    - "docs/platforms/nxp/**"
    - "third_party/simw-top-mini/**"
    - "third_party/openthread/platforms/nxp/**"
    - "config/nxp/**"

silabs:
  maintainers:
    - jmartinez-silabs
    - jepenven-silabs
    - lpbeliveau-silabs
    # Proposed maintainers (uncomment to activate):
    # - chirag-silabs
    # - arun-silabs
    # - rosahay-silabs

  paths:
    - "src/platform/silabs/**"
    - "examples/platform/silabs/**"
    - "examples/**/silabs/**"
    - "third_party/silabs/**"
    - "config/silabs/**"
    - "config/efr32/**"

