name: 'Notify Slack on Failure'
description: 'Sends a Slack notification when a post-merge or nightly job fails'
inputs:
  slack-webhook:
    description: 'The Slack Webhook URL'
    required: true
runs:
  using: "composite"
  steps:
    - name: Send Slack Notification
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        JOB_NAME: ${{ github.job }}
        SERVER_URL: ${{ github.server_url }}
        REPOSITORY: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
        SLACK_WEBHOOK: ${{ inputs.slack-webhook }}
      run: |
        # Do not notify on Pull Request failures
        if [ "$EVENT_NAME" = "pull_request" ]; then
          exit 0
        fi

        RUN_URL="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"
        PAYLOAD_TEXT="🚨 *CI Failure Alert* 🚨\n*Job:* ${JOB_NAME}\n*Run Details:* <${RUN_URL}|View Pipeline Logs>"
        
        curl -sS -X POST -H 'Content-type: application/json' \
        --data "{\"text\":\"${PAYLOAD_TEXT}\"}" \
        "$SLACK_WEBHOOK"
