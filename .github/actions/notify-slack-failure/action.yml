name: 'Notify Slack on Failure'
description: 'Sends a Slack notification when a post-merge or nightly job fails'
inputs:
  slack-webhook:
    description: 'The Slack Webhook URL'
    required: true
runs:
  using: "composite"
  steps:
    - name: Send Slack Notification
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        REF_NAME: ${{ github.ref_name }}
        JOB_NAME: ${{ github.job }}
        SERVER_URL: ${{ github.event.repository.html_url || github.server_url }}
        RUN_ID: ${{ github.run_id }}
        SLACK_WEBHOOK: ${{ inputs.slack-webhook }}
      run: |
        # 1. Do not notify on Pull Request / Merge Queue / PR-Target events
        if [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "pull_request_target" ] || [ "$EVENT_NAME" = "merge_group" ]; then
          echo "Skipping Slack notification: PR/Merge-Queue event ($EVENT_NAME)."
          exit 0
        fi

        # 2. Only notify on master or release branches (matching v*-branch)
        if [ "$REF_NAME" != "master" ] && [[ ! "$REF_NAME" == v*-branch ]]; then
          echo "Skipping Slack notification: Not on master or a release branch ($REF_NAME)."
          exit 0
        fi

        # 3. Send the Slack notification
        RUN_URL="${SERVER_URL}/actions/runs/${RUN_ID}"
        PAYLOAD_TEXT="🚨 *CI Failure Alert* 🚨\n*Job:* ${JOB_NAME}\n*Run Details:* <${RUN_URL}|View Pipeline Logs>"
        
        curl -sS -X POST -H 'Content-type: application/json' \
        --data "{\"text\":\"${PAYLOAD_TEXT}\"}" \
        "$SLACK_WEBHOOK"
