# Clusters for cluster-objects-override.cpp and Accessors-override.cpp.
# Note: not all clusters have Accessors entries (e.g. Groupcast has
# cluster-objects but no Accessors); the generator warns but proceeds.
casting_clusters:
    # Infrastructure
    - AccessControl
    - AdministratorCommissioning
    - BasicInformation
    - Binding
    - Descriptor
    - GeneralCommissioning
    - GeneralDiagnostics
    - GroupKeyManagement
    - Groupcast
    - Groups
    - Identify
    - NetworkCommissioning
    - OperationalCredentials
    # Casting-specific
    - AccountLogin
    - ApplicationBasic
    - ApplicationLauncher
    - AudioOutput
    - Channel
    - ContentAppObserver
    - ContentControl
    - ContentLauncher
    - KeypadInput
    - LevelControl
    - LowPower
    - MediaInput
    - MediaPlayback
    - Messages
    - OnOff
    - TargetNavigator
    - WakeOnLan

